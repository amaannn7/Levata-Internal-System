---
deployment:
  tasks:
    # The repo is cloned directly INTO the web root (/home/stagdctc/levataos.com),
    # so the app files are already served in place — no copy step is needed.
    # Deploy only ensures the writable data dirs exist (never overwrites live data).
    - export WEBROOT=/home/stagdctc/levataos.com
    - /bin/mkdir -p $WEBROOT/data/uploads
    - /bin/chmod 755 $WEBROOT/data $WEBROOT/data/uploads
